org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true

# Cordova resolves build-tools only within the same major as MIN_BUILD_TOOLS_VERSION in cdv-gradle-config.json
# (e.g. 33.0.2 → only 33.x). If your SDK has only newer majors (35+, 36+), set this to a folder that exists under
# %ANDROID_SDK_ROOT%\build-tools — avoids "No installed build tools found".
cdvBuildToolsVersion=35.0.0
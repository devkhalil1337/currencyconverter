<!-- Top header -->
<header class="app-header">
  <span class="header-title">{{headerText}}</span>
</header>

<!-- Page content -->
<div id="content">
  <div class="content-wrap">
    <div data-ng-include="activeOption"></div>
  </div>
</div>

<!-- Bottom navigation -->
<nav class="bottom-nav">
  <button class="nav-item" ng-class="{active: selectedTab === 'converter'}" ng-click="openPage('converter')">
    <span class="nav-icon"><i class="fas fa-exchange-alt"></i></span>
    <span class="nav-label">Converter</span>
  </button>
  <button class="nav-item" ng-class="{active: selectedTab === 'prices'}" ng-click="openPage('prices')">
    <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
    <span class="nav-label">Prices</span>
  </button>
  <button class="nav-item" ng-class="{active: selectedTab === 'favorite'}" ng-click="openPage('favorite')">
    <span class="nav-icon"><i class="fas fa-heart"></i></span>
    <span class="nav-label">Watchlist</span>
  </button>
  <button class="nav-item" ng-class="{active: selectedTab === 'settings'}" ng-click="openPage('settings')">
    <span class="nav-icon"><i class="fas fa-sliders-h"></i></span>
    <span class="nav-label">Settings</span>
  </button>
</nav>
